<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Castview</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #screen, #video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: #000;
  }
  /* WebRTC low-latency mode swaps the JPEG <img> for a live <video> */
  #video { display: none; }
  body.webrtc #video { display: block; }
  body.webrtc #screen { display: none; }
  body.webrtc #quality { display: none; }
  /* Rotated mode: for viewing a landscape screen on a portrait-held phone */
  body.rotated #screen,
  body.rotated #video {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100vh;
    height: 100vw;
    transform: translate(-50%, -50%) rotate(90deg);
  }

  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  #status {
    position: absolute;
    bottom: calc(62px + env(safe-area-inset-bottom));
    left: calc(16px + env(safe-area-inset-left));
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.55);
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }
  #status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
  }
  #status.reconnecting .dot {
    background: #fbbf24;
    animation: blink 1s ease infinite;
  }
  @keyframes blink { 50% { opacity: .2; } }
  #status .label { display: none; }
  #status.reconnecting .label { display: inline; }

  .controls {
    position: absolute;
    bottom: calc(12px + env(safe-area-inset-bottom));
    left: calc(12px + env(safe-area-inset-left));
    display: flex;
    align-items: center;
    background: rgba(16, 18, 22, 0.82);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    pointer-events: auto;
    overflow: hidden;
    transition: opacity .2s;
  }
  .handle {
    width: 40px; height: 40px;
    border: none;
    background: none;
    color: rgba(255, 255, 255, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
  }
  .handle svg { display: block; transition: transform .25s ease; }
  .controls.open .handle svg { transform: rotate(180deg); }
  .tray {
    display: flex;
    align-items: center;
    max-width: 0;
    opacity: 0;
    transition: max-width .28s ease, opacity .2s ease;
  }
  .controls.open .tray { max-width: 400px; opacity: 1; }
  .btn {
    border: none;
    background: none;
    color: rgba(255, 255, 255, 0.85);
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 12px;
    white-space: nowrap;
  }
  .btn + .btn { border-left: 1px solid rgba(255, 255, 255, 0.1); }
  .btn:active { background: rgba(255, 255, 255, 0.08); }
  .btn svg { display: block; flex-shrink: 0; }
  .btn.on { color: #e879f9; }
  #fs-exit { display: none; }
  body.fs #fs-enter { display: none; }
  body.fs #fs-exit { display: block; }

  /* PIN prompt */
  #pin-overlay {
    position: fixed;
    inset: 0;
    background: #0b0d10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 20;
    color: #eceff3;
  }
  #pin-overlay.show { display: flex; }
  #pin-overlay h1 { font-size: 17px; font-weight: 600; margin: 0; }
  #pin-overlay p { font-size: 13.5px; color: #808896; margin: 0; text-align: center; line-height: 1.6; }
  #pin-input {
    width: 170px;
    padding: 12px;
    font-size: 26px;
    letter-spacing: 12px;
    text-align: center;
    background: #14171c;
    border: 1px solid #242a33;
    border-radius: 10px;
    color: #eceff3;
    outline: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  #pin-input:focus { border-color: #f453c1; }
  #pin-error { color: #f87171; font-size: 13px; min-height: 18px; }

  /* Loader: shown until the first frame arrives */
  #loader {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 15;
    color: #808896;
    font-size: 13px;
  }
  #loader.hide { display: none; }
  #loader .ring {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 3px solid rgba(255, 255, 255, 0.12);
    border-top-color: #f453c1;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <img id="screen" alt="Mirrored screen">
  <video id="video" autoplay muted playsinline></video>

  <div id="loader">
    <div class="ring"></div>
    <div>Waiting for the screen…</div>
  </div>

  <div id="pin-overlay">
    <img src="/logo.png" alt="" width="56" height="56" style="border-radius:14px;">
    <h1>Enter PIN</h1>
    <p>The 4-digit PIN is shown on the computer<br>being mirrored (terminal or setup page).</p>
    <input id="pin-input" type="tel" inputmode="numeric" maxlength="4" autocomplete="off">
    <div id="pin-error"></div>
  </div>

  <div id="ui">
    <div id="status" class="reconnecting"><span class="dot"></span><span class="label">Connecting…</span></div>
    <div class="controls" id="controls">
      <button class="handle" id="handle" title="Show controls">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6l6 6-6 6"/>
        </svg>
      </button>
      <div class="tray">
        <button class="btn" id="quality" title="Sharpest picture uses more WiFi and can lag; Fast mode is smoother on weak connections">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 14l4-6"/>
            <path d="M4 17a9 9 0 0 1 16 0"/>
          </svg>
          <span id="quality-lbl">Quality: HD</span>
        </button>
        <button class="btn" id="rotate" title="Rotate the picture 90 degrees">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 11A8 8 0 1 0 12 20"/>
            <path d="M20 6v5h-5"/>
          </svg>
          Rotate
        </button>
        <button class="btn" id="fullscreen" title="Use the whole screen">
          <svg id="fs-enter" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
          </svg>
          <svg id="fs-exit" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"/>
          </svg>
          Full screen
        </button>
      </div>
    </div>
  </div>

  <script>
    const img = document.getElementById('screen');
    const statusEl = document.getElementById('status');
    const pinOverlay = document.getElementById('pin-overlay');
    const pinInput = document.getElementById('pin-input');
    const pinError = document.getElementById('pin-error');

    // --- PIN: from URL (QR path), then saved value, else ask ---
    const params = new URLSearchParams(location.search);
    let pin = params.get('pin') || sessionStorage.getItem('castview-pin') || '';
    if (params.get('pin')) {
      sessionStorage.setItem('castview-pin', pin);
      // Hide the PIN from the address bar / history.
      history.replaceState(null, '', location.pathname);
    }

    function askPin(message) {
      pinError.textContent = message || '';
      pinOverlay.classList.add('show');
      pinInput.value = '';
      pinInput.focus();
    }

    pinInput.addEventListener('input', () => {
      if (pinInput.value.length === 4) {
        pin = pinInput.value;
        sessionStorage.setItem('castview-pin', pin);
        pinOverlay.classList.remove('show');
        connect();
      }
    });

    // --- stream ---
    const loader = document.getElementById('loader');
    let currentUrl = null;
    let reconnectDelay = 500;
    const MAX_RECONNECT_DELAY = 5000;
    let ws = null;
    let pendingFrame = null;
    let rendering = false;

    async function renderFrames() {
      rendering = true;
      while (pendingFrame) {
        const blob = pendingFrame;
        pendingFrame = null;
        const url = URL.createObjectURL(blob);
        img.src = url;
        // Wait for the JPEG to finish decoding before accepting the next
        // frame, so the image never paints half-swapped.
        try { await img.decode(); } catch {}
        if (currentUrl) URL.revokeObjectURL(currentUrl);
        currentUrl = url;
        loader.classList.add('hide');
      }
      rendering = false;
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/?pin=${encodeURIComponent(pin)}`);
      ws.binaryType = 'blob';

      ws.onopen = () => {
        statusEl.classList.remove('reconnecting');
        reconnectDelay = 500;
      };

      ws.onmessage = (event) => {
        // Text frames are WebRTC signaling; binary frames are JPEG stream.
        if (typeof event.data === 'string') {
          handleSignal(JSON.parse(event.data));
          return;
        }
        // Keep only the newest frame: if decoding falls behind the network,
        // stale frames are dropped instead of queueing up (which reads as lag).
        pendingFrame = event.data;
        if (!rendering) renderFrames();
      };

      ws.onclose = (event) => {
        if (event.code === 4001) {
          askPin(pin ? 'Wrong PIN, try again' : '');
          return;
        }
        statusEl.classList.add('reconnecting');
        statusEl.querySelector('.label').textContent = 'Reconnecting…';
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
      };

      ws.onerror = () => ws.close();
    }
    connect();

    // --- WebRTC low latency path ---
    // When the host machine's setup tab is broadcasting, we receive the video
    // peer-to-peer and mute the JPEG stream. If the peer connection ever
    // drops (host tab closed, network hiccup), we fall back to JPEG frames.
    const video = document.getElementById('video');
    let pc = null;

    function sendSignal(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    function webrtcOff() {
      if (pc) { pc.onconnectionstatechange = null; pc.close(); pc = null; }
      video.srcObject = null;
      document.body.classList.remove('webrtc');
      sendSignal({ type: 'mode', value: 'jpeg' });
    }

    async function handleSignal(msg) {
      if (msg.type === 'webrtc-available') {
        if (typeof RTCPeerConnection === 'undefined') return; // stay on JPEG
        sendSignal({ type: 'webrtc-request' });
      } else if (msg.type === 'webrtc-gone') {
        webrtcOff();
      } else if (msg.type === 'webrtc-offer') {
        if (pc) pc.close();
        pc = new RTCPeerConnection();
        pc.ontrack = (e) => { video.srcObject = e.streams[0]; };
        pc.onicecandidate = (e) => {
          if (e.candidate) sendSignal({ type: 'webrtc-ice', candidate: e.candidate });
        };
        pc.onconnectionstatechange = () => {
          if (!pc) return;
          if (pc.connectionState === 'connected') {
            document.body.classList.add('webrtc');
            loader.classList.add('hide');
            sendSignal({ type: 'mode', value: 'webrtc' });
          } else if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
            webrtcOff();
          }
        };
        await pc.setRemoteDescription(msg.sdp);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        sendSignal({ type: 'webrtc-answer', sdp: pc.localDescription });
      } else if (msg.type === 'webrtc-ice' && pc) {
        await pc.addIceCandidate(msg.candidate).catch(() => {});
      }
    }

    // --- collapsible control pill: closed by default, auto-closes when idle ---
    const controls = document.getElementById('controls');
    let collapseTimer = null;
    function scheduleCollapse() {
      clearTimeout(collapseTimer);
      collapseTimer = setTimeout(() => controls.classList.remove('open'), 8000);
    }
    document.getElementById('handle').addEventListener('click', () => {
      controls.classList.toggle('open');
      if (controls.classList.contains('open')) scheduleCollapse();
    });
    controls.addEventListener('pointerdown', scheduleCollapse);

    // --- quality: HD (default) vs Fast (smaller frames for weak WiFi) ---
    const qualityBtn = document.getElementById('quality');
    const qualityLbl = document.getElementById('quality-lbl');
    let smooth = false;
    qualityBtn.addEventListener('click', () => {
      smooth = !smooth;
      qualityBtn.classList.toggle('on', smooth);
      qualityLbl.textContent = smooth ? 'Quality: Fast' : 'Quality: HD';
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'quality', value: smooth ? 'smooth' : 'sharp' }));
      }
    });

    // --- rotate: for portrait-held phones viewing a landscape screen ---
    document.getElementById('rotate').addEventListener('click', () => {
      document.body.classList.toggle('rotated');
    });

    // --- fullscreen ---
    document.getElementById('fullscreen').addEventListener('click', async () => {
      if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen().catch(() => {});
        // Landscape is almost always what you want for a mirrored desktop.
        // Not supported everywhere (iOS Safari); ignore failures.
        try { await screen.orientation.lock('landscape'); } catch {}
      } else if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        // iPhone Safari has no fullscreen API; rotate is the best we can do.
        alert('Fullscreen is not supported in this browser. Add this page to your Home Screen for a fullscreen experience.');
      }
    });
    document.addEventListener('fullscreenchange', () => {
      document.body.classList.toggle('fs', !!document.fullscreenElement);
    });

    // --- keep the viewer device awake while watching ---
    let wakeLock = null;
    async function acquireWakeLock() {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
    acquireWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') acquireWakeLock();
    });
  </script>
</body>
</html>
